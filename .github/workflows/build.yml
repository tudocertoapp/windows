name: Build and Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows App
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-windows-latest
          path: |
            release/*.exe
            release/latest*.yml
            release/*.blockmap

  # Publicação direta em tudocertoapp/windows (feed do electron-updater em package.json).
  # Secret neste repositório (App-Nativo-1.0): WINDOWS_REPO_WRITE_TOKEN = PAT com escrita em tudocertoapp/windows.
  release-windows:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artefatos
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-windows-latest
          path: artifacts

      - name: Exigir token para o repositório windows
        env:
          WINDOWS_TOKEN: ${{ secrets.WINDOWS_REPO_WRITE_TOKEN }}
        run: |
          if [ -z "$WINDOWS_TOKEN" ]; then
            echo "::error::Cria o secret WINDOWS_REPO_WRITE_TOKEN neste repositório (Actions secrets). PAT classic: scope repo, ou fine-grained: Contents Read+Write em tudocertoapp/windows."
            exit 1
          fi

      - name: Release em tudocertoapp/windows
        uses: softprops/action-gh-release@v2
        with:
          repository: tudocertoapp/windows
          tag_name: latest
          name: Tudo Certo — Windows (latest)
          make_latest: true
          generate_release_notes: true
          body: |
            Build a partir de [${{ github.repository }}](https://github.com/${{ github.repository }}) — commit `${{ github.sha }}`.
          files: |
            artifacts/**/*.exe
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.WINDOWS_REPO_WRITE_TOKEN }}
