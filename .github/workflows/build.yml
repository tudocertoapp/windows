# Monorepo tudocertoapp/windows: valida build web (Ubuntu) e gera release do instalador desktop (Windows).
# Vercel: liga o projeto a este mesmo repositório (raiz, vercel.json).
# Mobile: EAS/Expo (`eas.json`) — `eas build` a partir deste repo.

name: CI — web + release desktop

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      desktop_version:
        description: "Semver do instalador (ex. 1.0.13). Vazio = usar desktop-version.json / script"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  web:
    name: Build web (export)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar e exportar web
        run: |
          npm ci
          npm run web:build

  desktop-build:
    name: Build instalador Windows
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar versão desktop
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.desktop_version }}" ]; then
            node scripts/set-desktop-version.js "${{ inputs.desktop_version }}"
          else
            node scripts/set-desktop-version.js
          fi

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar e empacotar
        run: npm ci
      # Sem --publish never o electron-builder tenta publicar com GITHUB_TOKEN e falha no CI.
      - name: Electron + NSIS
        run: npm run build:win

      - name: Artefactos
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-windows-latest
          path: |
            release/*.exe
            release/latest*.yml
            release/*.blockmap

  release-desktop:
    name: Publicar feed desktop (release latest)
    needs: desktop-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download artefatos
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-windows-latest
          path: artifacts

      # softprops não substitui ficheiros na release; com milhares de assets o latest.yml ficou em 1.0.12.
      # publish-windows-update.js remove os 3 nomes antigos na release `latest` e envia os novos (electron-updater).
      - name: Atualizar release latest (latest.yml + Setup + blockmap)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          YML=$(find "$GITHUB_WORKSPACE/artifacts" -name 'latest.yml' | head -1)
          if [ -z "$YML" ]; then
            echo "::error::latest.yml não encontrado em artifacts/"
            find "$GITHUB_WORKSPACE/artifacts" -type f | head -50 || true
            exit 1
          fi
          export WINDOWS_RELEASE_DIR="$(dirname "$YML")"
          echo "WINDOWS_RELEASE_DIR=$WINDOWS_RELEASE_DIR"
          ls -la "$WINDOWS_RELEASE_DIR"
          node scripts/publish-windows-update.js
