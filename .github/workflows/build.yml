name: Build and Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    outputs:
      release_tag: ${{ steps.app_version.outputs.release_tag }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Versão para release (package.json)
        id: app_version
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          echo "release_tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Build Windows App
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            release/*.exe
            release/latest*.yml
            release/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Feed do auto-update (package.json build.publish → tudocertoapp/windows).
      # Crie um PAT com escopo `repo` e adicione como secret WINDOWS_RELEASE_PAT neste repositório.
      - name: Release to GitHub (tudocertoapp/windows)
        uses: softprops/action-gh-release@v2
        with:
          repository: tudocertoapp/windows
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Tudo Certo ${{ needs.build.outputs.release_tag }}
          make_latest: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.WINDOWS_RELEASE_PAT }}
