# Monorepo tudocertoapp/windows: valida build web (Ubuntu) e gera release do instalador desktop (Windows).
# Vercel: liga o projeto a este mesmo repositório (raiz, vercel.json).
# Mobile: EAS/Expo (`eas.json`) — `eas build` a partir deste repo.

name: CI — web + release desktop

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      desktop_version:
        description: "Semver do instalador (ex. 1.0.13). Vazio = usar desktop-version.json / script"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  web:
    name: Build web (export)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar e exportar web
        run: |
          npm ci
          npm run web:build

  desktop-build:
    name: Build instalador Windows
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar versão desktop
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.desktop_version }}" ]; then
            node scripts/set-desktop-version.js "${{ inputs.desktop_version }}"
          else
            node scripts/set-desktop-version.js
          fi

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar e empacotar
        run: npm ci
      - name: Electron + NSIS
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Artefactos
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-windows-latest
          path: |
            release/*.exe
            release/latest*.yml
            release/*.blockmap

  release-desktop:
    name: Release desktop (GitHub)
    needs: desktop-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download artefatos
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-windows-latest
          path: artifacts

      - name: Release tag latest (electron-updater)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Tudo Certo — Desktop (latest)
          make_latest: true
          generate_release_notes: true
          body: |
            Instalador Windows e `latest.yml` para atualização automática do app desktop (electron-updater).
            Repositório monorepo: **web + mobile + desktop** no mesmo código.
            Commit: `${{ github.sha }}`.
          files: |
            artifacts/**/*.exe
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
